name: DB hourly snapshot

# 매시간 백엔드(_state) 스냅샷을 떠서 변동이 있으면 별도 브랜치 db-history 에 커밋.
# main 이 아닌 브랜치라 GitHub Pages 재빌드를 유발하지 않음.
on:
  schedule:
    - cron: '0 * * * *'       # 매시 정각(UTC). GitHub 부하로 수~수십 분 지연될 수 있음.
  workflow_dispatch: {}         # 수동 실행 버튼(Actions 탭)

permissions:
  contents: write               # db-history 커밋/푸시용

concurrency:
  group: db-snapshot
  cancel-in-progress: false

env:
  SNAP_BRANCH: db-history

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live DB state (→ /tmp)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLAN_SLUG: insomnia
          # Cutover 전 fallback. Supabase secrets가 등록되면 사용하지 않음.
          APPS_SCRIPT_URL: https://script.google.com/macros/s/AKfycbx6GJnd7PitETPxym-CZv_LIqL5h_MTEZ0mECcRtk6Rwo0p3f1c7xBZrrhUpoywDB9w/exec
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_URL:-}" ] && [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            node scripts/supabase-snapshot.mjs /tmp/state.json /tmp/summary.json
          else
            curl -fsSL "${APPS_SCRIPT_URL}?action=getAll&merge=1" -o /tmp/raw.json
            if ! jq -e '(.data.members | length) > 0' /tmp/raw.json >/dev/null; then
              echo "::error::유효한 DB 응답이 아님"; head -c 400 /tmp/raw.json; exit 1
            fi
            jq -S '.data' /tmp/raw.json > /tmp/state.json
            jq -S '{members:(.data.members|length), participationDays:(.data.participation.byDate|length), distributions:(.data.distributionLog|length), settlements:(.data.settlements|length), qaReports:((.data.qaReports // [])|length), equipMembers:([.data.members[]|select((.equip|length)>0)]|length)}' /tmp/raw.json > /tmp/summary.json
          fi

      - name: Commit to db-history branch if changed
        run: |
          set -euo pipefail
          git config user.name "db-snapshot-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 스냅샷 전용 브랜치로 전환(없으면 orphan 으로 새로 만듦) — main 을 건드리지 않아 Pages 재빌드 없음
          if git ls-remote --exit-code --heads origin "$SNAP_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$SNAP_BRANCH" --depth=1
            git checkout -B "$SNAP_BRANCH" "origin/$SNAP_BRANCH"
          else
            git checkout --orphan "$SNAP_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true   # orphan 초기 인덱스(=main 파일들) 비움
          fi
          mkdir -p db-snapshots
          cp /tmp/state.json db-snapshots/state.json
          cp /tmp/summary.json db-snapshots/summary.json
          git add db-snapshots/state.json db-snapshots/summary.json
          if git diff --cached --quiet; then
            echo "DB 변동 없음 — 커밋 생략"
          else
            git commit -m "chore(db): 스냅샷 $(date -u +'%Y-%m-%d %H:%MZ')"
            git push origin "$SNAP_BRANCH"
          fi
